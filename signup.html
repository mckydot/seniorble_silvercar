<!-- 기존 이메일 입력 폼 그룹을 다음과 같이 수정 -->

<!-- 이메일 입력 -->
<div class="form-group">
    <label for="email">이메일 *</label>
    <div class="input-wrapper">
        <input 
            type="email" 
            id="email" 
            name="email"
            placeholder="your@email.com" 
            required 
            autocomplete="email">
        <span class="input-icon">✉</span>
    </div>
    <button type="button" id="emailVerifyBtn" class="verify-btn">
        인증 코드 발송
    </button>
    <small class="input-help">로그인 시 사용할 이메일 주소</small>
    
    <!-- 이메일 인증 완료 메시지 -->
    <div id="emailVerifiedMessage" class="verified-message hidden">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        이메일 인증 완료
    </div>
</div>

<!-- 인증 코드 입력 영역 (처음엔 숨김) -->
<div id="verificationCodeSection" class="form-group hidden">
    <label for="verificationCode">인증 코드</label>
    <div class="input-wrapper">
        <input 
            type="text" 
            id="verificationCode" 
            name="verificationCode"
            placeholder="6자리 숫자 입력" 
            maxlength="6"
            inputmode="numeric"
            pattern="[0-9]{6}">
        <span class="input-icon">🔑</span>
    </div>
    <button type="button" id="verifyCodeBtn" class="verify-btn">
        확인
    </button>
    <small id="timerDisplay" class="input-help timer hidden"></small>
</div>

<!-- 성공 메시지 표시 영역 추가 (에러 메시지 위에) -->
<div id="successMessage" class="success-message hidden"></div>
